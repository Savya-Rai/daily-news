name: First Light Daily Briefing

on:
  schedule:
    # 6:00 AM Australia/Sydney during AEST is 20:00 UTC on the previous day.
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Fetch fresh news even if today's briefing already exists"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check existing briefing date
        id: briefing
        run: node scripts/check-briefing-date.mjs

      - name: Generate fresh briefing
        if: steps.briefing.outputs.fresh != 'true' || github.event.inputs.force_refresh == 'true'
        run: npm run generate

      - name: Reuse existing briefing
        if: steps.briefing.outputs.fresh == 'true' && github.event.inputs.force_refresh != 'true'
        run: |
          echo "Today's briefing already exists for ${{ steps.briefing.outputs.today }}."
          echo "Skipping RSS fetch and rebuilding the static site only."
          cat > dist-news-log.json <<'JSON'
          {
            "outputGeneratedSuccessfully": true,
            "skippedGeneration": true,
            "reason": "Today's briefing already exists; reused existing public/news-data.json."
          }
          JSON

      - name: Build site
        run: npm run build:site

      - name: Upload generation log
        uses: actions/upload-artifact@v7
        with:
          name: first-light-generation-log
          path: dist-news-log.json

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
